<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D1B2A" />
    <link rel="icon" href="branding/favicon.svg" type="image/svg+xml" />
    <title>Fixpoint — Offline</title>
    <style>
      :root { font-family: "Open Sans", Arial, sans-serif; color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
        background: #0D1B2A;
        color: #FFFFFF;
      }
      main {
        width: min(520px, 100%);
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 24px;
        padding: 32px;
        background: rgba(255,255,255,.04);
        text-align: center;
      }
      img { width: 72px; height: 72px; margin-bottom: 10px; }
      span { color: #B64545; font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; }
      h1 { margin: 12px 0; font-size: clamp(30px, 8vw, 48px); letter-spacing: -.05em; }
      p { margin: 0; color: rgba(255,255,255,.65); line-height: 1.7; }
      button {
        margin-top: 24px;
        border: 0;
        border-radius: 999px;
        padding: 12px 20px;
        background: #FFFFFF;
        color: #0D1B2A;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="branding/symbol-light.svg" alt="" aria-hidden="true" />
      <span>Fixpoint offline</span>
      <h1>Connection unavailable</h1>
      <p>
        Previously opened local documents may still be available after the
        application reconnects. Cloud synchronization requires an internet
        connection.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
